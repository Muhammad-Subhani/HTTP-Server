<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ICT Project</title>
    <!-- CSS stylesheets Import -->
    <link href="styles/main.css" rel="stylesheet" />
    <link href="styles/header.css" rel="stylesheet" />
    <link href="styles/carousle.css" rel="stylesheet" />
    <link href="styles/searchbar.css" rel="stylesheet" />
    <link href="styles/products-section.css" rel="stylesheet" />
    <!-- JS HTML Components Import -->
    <script src="Components/header.js" type="text/javascript" defer></script>
    <script src="Components/searchbar.js" type="text/javascript" defer></script>
    <script src="Components/card.js" type="text/javascript" defer></script>

    <!-- JS Scripts Import -->
    <script src="JS/carousle.js" type="text/javascript" defer></script>
    <script src="JS/category.js" type="text/javascript" defer></script>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=BBH+Bogle&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- Navigation Header -->
    <header-comp></header-comp>
    <!-- ab bari hay search menu ki, ye baar bar use kr skty haain is lia mene socha kay is trha hi bna doon  -->
    <search-bar></search-bar>
    <!-- Sliding Carousle -->
    <div class="container">
      <div class="dabba">
        <div class="btnz">
          <button id="Forward">></button>
          <button id="Previous"><</button>
        </div>
        <div class="screen">
          <div class="cdabba" id="db1">
            <h1 id="first">
              &nbsp; GRAB <br />
              &nbsp;&nbsp; YOUR &nbsp; <br />
              &nbsp; &nbsp; NEW <br />
              &nbsp; SNEAKERS
            </h1>
            <button id="fbtn">SHOP NOW</button>
          </div>
          <div class="cdabba" id="db2">
            <h1 id="second">
              Cannon &nbsp; <br />TO &nbsp;&nbsp;&nbsp;<br />
              BURST &nbsp; <br />
              IN &nbsp;&nbsp;&nbsp;<br />
              TECH &nbsp;
            </h1>
            <button id="sbtn">SHOP NOW</button>
          </div>
          <div class="cdabba" id="db3">
            <h1 id="third">
              FASCINATING EMBROIDERY <br />
              MUCH MORE
            </h1>
            <button id="tbtn">SHOP NOW</button>
          </div>
        </div>
      </div>
    </div>
    <!-- Our Products Section -->
    <div id="Our-Products" class="products-section">
      <h1 class="product-section-heading">Our Products</h1>
      <div class="categories">
        <button onclick="showAll(event)" class="category active-category">
          All
        </button>
        <button onclick="showCards(event , 'elec')" class="category">
          Electronics
        </button>
        <button onclick="showCards(event, 'shoewear')" class="category">
          Shoewear
        </button>
      </div>
      <div class="products">
        <card-comp
          title="Sony Digital Camera"
          price="Rs 250,000"
          image="Assets/Products/Sony_Camera.jpg"
          id="elec"
        ></card-comp>
        <card-comp
          title="Infinix InBook"
          price="Rs 99,900"
          image="Assets/Products/infinix_inbook.webp"
          id="elec"
        ></card-comp>
        <card-comp
          title="Lenovo IdeaPad Slim 3"
          price="Rs 105,900"
          image="Assets/Products/lenovo_ideapad.webp"
          id="elec"
        ></card-comp>
        <card-comp
          title="Apple MacBook Pro 14 M5"
          price="Rs 569,900"
          image="Assets/Products/macbook_pro.jpg"
          id="elec"
        ></card-comp>
        <card-comp
          title="Samsung T9 1TB SSD"
          price="Rs 44,990"
          image="Assets/Products/samsung_t9.webp"
          id="elec"
        ></card-comp>
        <card-comp
          title="Ndure High Performance Sneakers"
          price="Rs 2500"
          image="Assets/Products/Ndure_sneakers.webp"
          id="shoewear"
        ></card-comp>
        <card-comp
          title="Elite Running Joggers"
          price="Rs 2,690"
          image="Assets/Products/joggers.jpg"
          id="shoewear"
        ></card-comp>
      </div>
    </div>
  </body>
</html>
