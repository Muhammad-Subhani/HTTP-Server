  <head>

    <title>ICT Project</title>
    <!-- CSS stylesheets Import -->
    <link href="Styles/main.css" rel="stylesheet" />
    <link href="Styles/tech-products.css" rel="stylesheet" />
    <link href="Styles/header.css" rel="stylesheet" />
    <link href="Styles/footer.css" rel="stylesheet" />

    <link href="Styles/ourservices.css" rel="stylesheet" />
    <link href="Styles/products-section.css" rel="stylesheet" />
    <link href="Styles/patti.css" rel="stylesheet" />
    <link href="Styles/reviews.css" rel="stylesheet" />

    <!-- JS HTML Components Import -->
    <script src="Components/header.js" type="text/javascript" defer></script>
    <script src="Components/searchbar.js" type="text/javascript" defer></script>
    <script src="Components/card.js" type="text/javascript" defer></script>
    <script src="Components/footer.js" type="text/javascript" defer></script>

    <!-- JS Scripts Import -->
    <script src="JS/carousle.js" type="text/javascript" defer></script>
    <script src="JS/category.js" type="text/javascript" defer></script>
    <script src="JS/CSSUPPORT.js" type="text/javascript" defer></script>
    <script src="JS/animation.js" type="text/javascript" defer></script>

    <!-- Fonts -->

      rel="stylesheet"

      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

  <body>
    <!-- Navigation Header -->
    <header-comp></header-comp>
    <div class="head-img">
      <h3 class="page-heading reveal">Tech Products</h3>
      <p class="head-description reveal">
        We provide you with the latest and best tech gadgets and equipments.
      </p>
    </div>

    <!-- Photograhy Section -->
    <div class="products-section">
      <h1 class="product-section-heading reveal">Photograhy</h1>
      <div class="categories reveal">
        <button
          onclick="showAll(event, 'Photograhy')"
          class="category Photograhy active-category"
        >
          All
        </button>
        <button
          onclick="showCards(event , 'camera', 'Photograhy')"
          class="category Photograhy"
        >
          Camera
        </button>
        <button
          onclick="showCards(event, 'lens', 'Photograhy')"
          class="category Photograhy"
        >
          Lenses
        </button>
      </div>
      <!-- Photograhy Product Cards -->
      <div class="products reveal">
        <card-comp
          title="Canon EOS 200D II With EF-S 18-55mm f/4-5.6 IS STM Lens"
          price="174000"
          image="Assets/Products/0ViHcanon-eos-200d-ii-with-ef-s-18-55mm.webp"
          id="camera"
          pehchan="Photograhy"
          page="tech-products"
        ></card-comp>
        <card-comp
          title="Sony A7 Full-Frame Mirrorless Digital Camera"
          price="950000"
          image="Assets/Products/Sony_Camera.jpg"
          id="camera"
          page="tech-products"
          pehchan="Photograhy"
        ></card-comp>
        <card-comp
          title="Canon EOS M3 Mirrorless Digital Camera with 18-55mm Lens"
          price="61500"
          image="Assets/Products/Canon-EOS-M3-Mirrorless.jpg"
          id="camera"
          page="tech-products"
          pehchan="Photograhy"
        ></card-comp>
        <card-comp
          title="Nikon NIKKOR Z MC 50MM F/2.8S"
          price="170000"
          image="Assets/Products/nikkon-lens-50mm.png"
          id="lens"
          page="tech-products"
          pehchan="Photograhy"
        ></card-comp>
        <card-comp
          title="Nikon PC-E Micro-NIKKOR 85mm f/2.8D"
          price="370000"
          image="Assets/Products/PCE_Micro_NIKKOR_85mm_f2.8D_tilt.png"
          id="lens"
          page="tech-products"
          pehchan="Photograhy"
        ></card-comp>
        <card-comp
          title="Canon EF-S 18-55mm f/3.5-5.6 IS STM Lens"
          price="12000"
          image="Assets/Products/sMzHCanon-EF-S4.jpg"
          id="lens"
          page="tech-products"
          pehchan="Photograhy"
        ></card-comp>
      </div>
    </div>

    <div class="products-section">
      <h1 class="product-section-heading reveal">Computing Devices</h1>
      <div class="categories reveal">
        <button
          onclick="showAll(event , 'Computing')"
          class="category Computing active-category"
        >
          All
        </button>
        <button
          onclick="showCards(event , 'laptop', 'Computing')"
          class="category Computing"
        >
          Laptops
        </button>
        <button
          onclick="showCards(event, 'storage', 'Computing')"
          class="category Computing"
        >
          Storage
        </button>
      </div>
      <!-- Photograhy Product Cards -->
      <div class="products reveal">
        <card-comp
          title="Infinix InBook"
          price="99900"
          image="Assets/Products/infinix_inbook.webp"

          page="tech-products"
          pehchan="Computing"

        <card-comp

          page="tech-products"

    <footer-comp></footer-comp>
